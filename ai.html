<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ambivora AI Assistant</title>

  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #F8F9FC; color: #0D1B3E; }
    .chat-container { max-width: 900px; margin: 40px auto; background: #fff; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); overflow: hidden; }
    .chat-header { background: #0D1B3E; color: white; padding: 25px; text-align: center; }
    .chat-header h1 { margin: 0; font-size: 32px; }
    .chat-header span { color: #1E90FF; }
    .chat-box { height: 450px; padding: 25px; overflow-y: auto; background: #F8F9FC; }
    .message { max-width: 75%; padding: 14px 18px; margin-bottom: 15px; border-radius: 16px; line-height: 1.5; white-space: pre-wrap; }
    .bot { background: #fff; color: #0D1B3E; border: 1px solid #e5e7eb; }
    .user { background: #1E90FF; color: white; margin-left: auto; }
    .chat-input { display: flex; gap: 10px; padding: 20px; background: white; border-top: 1px solid #e5e7eb; }
    .chat-input input { flex: 1; padding: 15px; border-radius: 12px; border: 1px solid #ccc; font-size: 16px; outline: none; }
    .chat-input button { background: #1E90FF; color: white; border: none; padding: 15px 25px; border-radius: 12px; font-size: 16px; cursor: pointer; }
    .chat-input button:hover { background: #0D1B3E; }
  </style>
</head>

<body>
  <div class="chat-container">
    <div class="chat-header">
      <h1>Ambivora <span>AI</span></h1>
      <p>Your AI Marketing Assistant</p>
    </div>

    <div class="chat-box" id="chatBox">
      <div class="message bot">
        Hi 👋 I am Ambivora AI. Ask me anything about marketing, SEO, ads, branding, or content ideas.
      </div>
    </div>

    <div class="chat-input">
      <input type="text" id="userInput" placeholder="Ask your marketing question..." />
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    async function sendMessage() {
      const input = document.getElementById("userInput");
      const chatBox = document.getElementById("chatBox");
      const message = input.value.trim();

      if (!message) return;

      chatBox.innerHTML += `<div class="message user">${message}</div>`;
      input.value = "";

      chatBox.innerHTML += `<div class="message bot" id="loading">Thinking...</div>`;
      chatBox.scrollTop = chatBox.scrollHeight;

      try {
        const response = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: message })
        });

        const data = await response.json();

        document.getElementById("loading").remove();

        chatBox.innerHTML += `<div class="message bot">${data.reply || "No reply received."}</div>`;
      } catch (error) {
        document.getElementById("loading").innerHTML = "❌ Error connecting to AI. api/chat.js check karo.";
      }

      chatBox.scrollTop = chatBox.scrollHeight;
    }
  </script>
</body>
</html>
